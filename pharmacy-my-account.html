<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي | فارمازون — My Account</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#0B7A5B;--pri-h:#096348;--pri-l:#12B886;--pri-p:#E6F9F1;--pri-g:#F0FDF7;
  --acc:#D4A843;--acc-l:#FDF3D7;
  --danger:#DC3545;--danger-p:#FDE8EA;
  --warn:#F59E0B;--warn-p:#FEF3C7;
  --info:#3B82F6;--info-p:#DBEAFE;
  --bg:#F4F7F6;--bg-c:#FFF;
  --tx:#1B2E28;--tx2:#4A6258;--tx3:#8DA49A;
  --bd:#DFE8E4;--bd-l:#EEF2F0;
  --sh-s:0 1px 3px rgba(11,122,91,.06);--sh:0 4px 20px rgba(11,122,91,.08);--sh-l:0 12px 40px rgba(11,122,91,.12);
  --r:16px;--rs:10px;--rx:6px;
  --tr:.25s cubic-bezier(.4,0,.2,1);
  --hh:68px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit','Noto Kufi Arabic',sans-serif;background:var(--bg);color:var(--tx);line-height:1.65;min-height:100vh}
body[dir="rtl"]{font-family:'Noto Kufi Arabic','Outfit',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--pri-l);border-radius:5px}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;border:none}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd-l);height:var(--hh)}
.hdr-in{max-width:1280px;margin:0 auto;padding:0 32px;height:100%;display:flex;align-items:center;gap:20px}
.logo-l{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-m{width:40px;height:40px;background:linear-gradient(135deg,var(--pri),var(--pri-l));border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 14px rgba(11,122,91,.3)}
.logo-n{font-family:'Playfair Display','Noto Kufi Arabic',serif;font-size:19px;font-weight:700;color:var(--pri-h)}
.hdr-nav{display:flex;align-items:center;gap:6px;margin-inline-start:auto}
.n-link{padding:8px 16px;font-size:13px;font-weight:500;color:var(--tx2);border-radius:50px;transition:var(--tr)}
.n-link:hover{background:var(--pri-p);color:var(--pri)}
.lang-b{padding:7px 16px;background:var(--pri-p);color:var(--pri);border-radius:50px;font-size:12px;font-weight:600;transition:var(--tr)}
.lang-b:hover{background:var(--pri);color:#fff}

/* HERO */
.p-hero{background:linear-gradient(135deg,#084D38,var(--pri),var(--pri-l));padding:44px 0 64px;position:relative;overflow:hidden}
.p-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(212,168,67,.1),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.06),transparent 50%)}
.p-hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:36px;background:var(--bg);border-radius:50% 50% 0 0}
.hero-in{max-width:1280px;margin:0 auto;padding:0 32px;position:relative;z-index:1;display:flex;align-items:center;gap:24px}
.avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;backdrop-filter:blur(8px)}
.hero-info h1{font-family:'Playfair Display','Noto Kufi Arabic',serif;font-size:26px;color:#fff}
.hero-info p{color:rgba(255,255,255,.7);font-size:13px;margin-top:2px}
.hero-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.h-badge{padding:5px 14px;border-radius:50px;font-size:11px;font-weight:600;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}

/* MAIN LAYOUT */
.main-l{max-width:1280px;margin:0 auto;padding:28px 32px 80px;display:grid;grid-template-columns:240px 1fr;gap:28px}

/* SIDEBAR NAV */
.side-nav{position:sticky;top:calc(var(--hh) + 20px);height:fit-content;display:flex;flex-direction:column;gap:4px}
.sn-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--rs);font-size:13.5px;font-weight:500;color:var(--tx2);transition:var(--tr);cursor:pointer;background:transparent;text-align:inherit;width:100%}
.sn-item:hover{background:var(--pri-p);color:var(--pri)}
.sn-item.active{background:var(--pri);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(11,122,91,.25)}
.sn-item svg{width:18px;height:18px;flex-shrink:0}
.sn-item .sn-badge{margin-inline-start:auto;font-size:10px;font-weight:700;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px}
.sn-item:not(.active) .sn-badge{background:var(--danger-p);color:var(--danger)}
.sn-divider{height:1px;background:var(--bd-l);margin:8px 0}
.sn-logout{color:var(--danger)}
.sn-logout:hover{background:var(--danger-p);color:var(--danger)}

/* CONTENT AREA */
.content{min-width:0}

/* TAB PANELS */
.tab-panel{display:none;animation:fadeUp .4s ease}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--bg-c);border:1px solid var(--bd-l);border-radius:var(--r);box-shadow:var(--sh-s);overflow:hidden}
.card+.card{margin-top:20px}
.c-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--bd-l);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.c-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.c-title svg{width:20px;height:20px;color:var(--pri)}
.c-body{padding:24px}
.c-action{font-size:12px;font-weight:600;color:var(--pri);padding:6px 14px;border-radius:50px;transition:var(--tr);background:var(--pri-p)}
.c-action:hover{background:var(--pri);color:#fff}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-c);border:1px solid var(--bd-l);border-radius:var(--r);padding:20px;text-align:center;transition:var(--tr)}
.stat-card:hover{box-shadow:var(--sh);transform:translateY(-3px)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px}
.stat-num{font-size:28px;font-weight:700;color:var(--tx)}
.stat-label{font-size:12px;color:var(--tx3);margin-top:2px}

/* FORM ELEMENTS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:var(--tx2)}
.form-input{padding:12px 16px;border:1.5px solid var(--bd);border-radius:var(--rx);font-size:13.5px;font-family:inherit;color:var(--tx);transition:var(--tr);background:var(--bg)}
.form-input:focus{outline:none;border-color:var(--pri-l);background:#fff;box-shadow:0 0 0 3px rgba(18,184,134,.1)}
.form-input::placeholder{color:var(--tx3)}
select.form-input{-webkit-appearance:none;appearance:none;cursor:pointer}
.form-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-pri{padding:11px 28px;background:var(--pri);color:#fff;border-radius:var(--rx);font-size:13px;font-weight:600;transition:var(--tr)}
.btn-pri:hover{background:var(--pri-h)}
.btn-sec{padding:11px 28px;background:transparent;border:1.5px solid var(--bd);color:var(--tx2);border-radius:var(--rx);font-size:13px;font-weight:500;transition:var(--tr)}
.btn-sec:hover{border-color:var(--pri);color:var(--pri)}

/* ORDER HISTORY TABLE */
.orders-list{overflow-x:auto}
.o-table{width:100%;border-collapse:collapse;font-size:13px}
.o-table th{text-align:inherit;padding:12px 16px;background:var(--pri-g);color:var(--tx2);font-weight:600;font-size:12px;white-space:nowrap;border-bottom:2px solid var(--bd-l)}
.o-table td{padding:14px 16px;border-bottom:1px solid var(--bd-l);vertical-align:middle}
.o-table tr:hover td{background:var(--pri-g)}
.o-id{font-weight:700;color:var(--pri)}
.o-status{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;display:inline-block}
.o-s-delivered{background:#D1FAE5;color:#065F46}
.o-s-shipped{background:var(--warn-p);color:#92400E}
.o-s-processing{background:var(--info-p);color:#1D4ED8}
.o-s-cancelled{background:var(--danger-p);color:var(--danger)}
.o-action-btn{padding:6px 14px;border-radius:var(--rx);font-size:11px;font-weight:600;transition:var(--tr);background:var(--pri-p);color:var(--pri)}
.o-action-btn:hover{background:var(--pri);color:#fff}

/* ADDRESS CARDS */
.addr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.addr-card{border:1.5px solid var(--bd);border-radius:var(--rs);padding:20px;position:relative;transition:var(--tr)}
.addr-card:hover{border-color:var(--pri-l);box-shadow:var(--sh)}
.addr-card.default{border-color:var(--pri);background:var(--pri-g)}
.addr-default-tag{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--pri);color:#fff}
body[dir="ltr"] .addr-default-tag{left:auto;right:12px}
.addr-type{font-size:12px;font-weight:600;color:var(--pri-l);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.addr-text{font-size:13.5px;color:var(--tx);line-height:1.7;margin-bottom:10px}
.addr-phone{font-size:12px;color:var(--tx3)}
.addr-actions{display:flex;gap:8px;margin-top:12px}
.addr-btn{padding:6px 14px;border-radius:var(--rx);font-size:11px;font-weight:600;transition:var(--tr)}
.addr-edit{background:var(--pri-p);color:var(--pri)}
.addr-edit:hover{background:var(--pri);color:#fff}
.addr-del{background:var(--danger-p);color:var(--danger)}
.addr-del:hover{background:var(--danger);color:#fff}

/* WISHLIST */
.wish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.wish-card{border:1px solid var(--bd-l);border-radius:var(--rs);overflow:hidden;transition:var(--tr)}
.wish-card:hover{box-shadow:var(--sh);transform:translateY(-3px)}
.wish-img{height:140px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#F2F7F5,#E8F0EC)}
.wish-img img{max-height:90%;max-width:90%;object-fit:contain}
.wish-body{padding:14px}
.wish-brand{font-size:10px;font-weight:600;color:var(--pri-l);text-transform:uppercase;letter-spacing:1px}
.wish-name{font-size:13px;font-weight:600;margin:4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wish-price{font-size:16px;font-weight:700;color:var(--pri-h)}
.wish-actions{display:flex;gap:6px;margin-top:10px}
.wish-cart{flex:1;padding:8px;background:var(--pri);color:#fff;border-radius:var(--rx);font-size:11px;font-weight:600;text-align:center;transition:var(--tr)}
.wish-cart:hover{background:var(--pri-h)}
.wish-rem{width:34px;height:34px;border-radius:var(--rx);display:flex;align-items:center;justify-content:center;background:var(--danger-p);color:var(--danger);transition:var(--tr);font-size:14px}
.wish-rem:hover{background:var(--danger);color:#fff}

/* PRESCRIPTIONS */
.rx-list{display:flex;flex-direction:column;gap:12px}
.rx-item{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--bd-l);border-radius:var(--rs);transition:var(--tr)}
.rx-item:hover{box-shadow:var(--sh)}
.rx-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.rx-info{flex:1;min-width:0}
.rx-name{font-size:14px;font-weight:600}
.rx-meta{font-size:12px;color:var(--tx3);margin-top:2px}
.rx-status{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;white-space:nowrap}
.rx-approved{background:#D1FAE5;color:#065F46}
.rx-pending{background:var(--warn-p);color:#92400E}
.rx-expired{background:var(--danger-p);color:var(--danger)}

/* WALLET */
.wallet-bal{display:flex;align-items:center;gap:20px;padding:24px;background:linear-gradient(135deg,var(--pri),var(--pri-l));border-radius:var(--r);color:#fff;margin-bottom:20px}
.wallet-bal .wb-icon{font-size:40px}
.wallet-bal .wb-amount{font-size:36px;font-weight:700}
.wallet-bal .wb-label{font-size:13px;opacity:.8}
.wallet-history{font-size:13px}
.wh-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bd-l)}
.wh-item:last-child{border-bottom:none}
.wh-info{display:flex;align-items:center;gap:12px}
.wh-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.wh-dot.credit{background:#D1FAE5}
.wh-dot.debit{background:var(--danger-p)}
.wh-desc span{font-weight:600;display:block;font-size:13px}
.wh-desc small{color:var(--tx3);font-size:11px}
.wh-amount{font-weight:700;font-size:14px}
.wh-amount.credit{color:var(--pri)}
.wh-amount.debit{color:var(--danger)}

/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--bd-l)}
.setting-row:last-child{border-bottom:none}
.set-info{display:flex;align-items:center;gap:12px}
.set-icon{width:40px;height:40px;border-radius:10px;background:var(--pri-p);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.set-label h5{font-size:13.5px;font-weight:600}
.set-label p{font-size:11.5px;color:var(--tx3)}
/* Toggle */
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--bd);border-radius:24px;transition:var(--tr)}
.toggle .slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:var(--pri)}
.toggle input:checked+.slider::before{transform:translateX(20px)}

/* MOBILE */
.mob-menu-btn{display:none;width:40px;height:40px;border-radius:var(--rs);background:var(--pri-p);color:var(--pri);align-items:center;justify-content:center;font-size:20px}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300}
.side-overlay.show{display:block}
.side-close{display:none;position:absolute;top:12px;left:12px;width:32px;height:32px;border-radius:50%;background:var(--bd-l);align-items:center;justify-content:center;font-size:16px}
body[dir="ltr"] .side-close{left:auto;right:12px}

@media(max-width:900px){
  .main-l{grid-template-columns:1fr}
  .side-nav{position:fixed;top:0;right:-280px;width:260px;height:100vh;background:var(--bg);z-index:400;padding:60px 16px 24px;overflow-y:auto;transition:right .35s ease;box-shadow:var(--sh-l)}
  body[dir="ltr"] .side-nav{right:auto;left:-280px;transition:left .35s ease}
  .side-nav.open{right:0}
  body[dir="ltr"] .side-nav.open{left:0}
  .mob-menu-btn{display:flex}
  .side-close{display:flex}
  .stats-row{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .addr-grid{grid-template-columns:1fr}
  .hero-in{flex-direction:column;text-align:center}
  .hero-badges{justify-content:center}
}
@media(max-width:500px){
  .hdr-in{padding:0 16px;gap:10px}
  .n-link{display:none}
  .main-l{padding:20px 16px 60px}
  .stats-row{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:14px}
  .stat-num{font-size:22px}
  .wish-grid{grid-template-columns:1fr 1fr;gap:10px}
  .o-table{font-size:12px}
  .o-table th,.o-table td{padding:10px 8px}
}
</style>
</head>

      <span data-ar="بياناتي" data-en="My Profile">بياناتي</span>
    </button>
    <button class="sn-item" data-tab="addresses" onclick="switchTab('addresses',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
